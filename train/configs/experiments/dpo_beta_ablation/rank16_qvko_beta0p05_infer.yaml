  overwrite_output_dir: false
  resume_from_checkpoint: null
logging:
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  report_to: none
